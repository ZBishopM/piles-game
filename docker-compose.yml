version: '3.8'

services:
  # ── Backend + Frontend ──────────────────────────────────────────────────────
  app:
    build: .
    container_name: piles-app
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

